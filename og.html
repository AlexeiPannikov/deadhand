<!doctype html>
<!-- og card generator. Render at 1200x630 and screenshot into assets/og-image.png.
     ponytail: a throwaway template, not a deployed page. Headless shot command is in the README/chat. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #0a0b0d;
        --txt: #e7e9ec;
        --muted: #9aa3ad;
        --accent: #f5a524;
        --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { background: var(--bg); }
      .card {
        width: 1200px;
        height: 630px;
        background: radial-gradient(
            900px 500px at 18% 50%,
            rgba(245, 165, 36, 0.1),
            transparent 65%
          ),
          var(--bg);
        display: flex;
        align-items: center;
        gap: 56px;
        padding: 0 72px;
        font-family: var(--sans);
        overflow: hidden;
      }
      .hank {
        flex: 0 0 auto;
        width: 340px;
        height: auto;
        filter: drop-shadow(0 0 40px rgba(245, 165, 36, 0.25));
      }
      .copy { flex: 1 1 auto; min-width: 0; }
      .logo {
        font-weight: 800;
        font-size: 64px;
        letter-spacing: -0.02em;
        color: var(--txt);
        line-height: 1;
      }
      .logo b { color: var(--accent); font-weight: 800; }
      .label {
        margin-top: 18px;
        font: 600 18px/1 var(--mono);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .label .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #46b06f;
        box-shadow: 0 0 10px #46b06f;
      }
      .slogan {
        margin-top: 34px;
        font-weight: 700;
        font-size: 52px;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--txt);
      }
      .slogan .hl { color: var(--accent); }
      .feats {
        margin-top: 36px;
        font: 500 22px/1 var(--mono);
        color: var(--muted);
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="hank" src="assets/hank-watch.png" alt="Hank, on watch" />
      <div class="copy">
        <div class="logo">DEAD<b>HAND</b></div>
        <div class="label"><span class="dot"></span>On watch</div>
        <div class="slogan">We're on watch.<br /><span class="hl">Sleep well.</span></div>
        <div class="feats">Dead man's switch · Uptime · Security drift</div>
      </div>
    </div>
  </body>
</html>
