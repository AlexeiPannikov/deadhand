<svg xmlns="http://www.w3.org/2000/svg" width="240" height="48" viewBox="0 0 240 48" fill="none" role="img" aria-label="Deadhand">
  <!-- mark -->
  <g transform="translate(0,8)">
    <g stroke="#f5a524" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.5 8h13" />
      <path d="M16 8v6.5" />
      <rect x="8.5" y="14.5" width="15" height="10" rx="2.5" />
    </g>
    <circle cx="19.5" cy="19.5" r="1.6" fill="#46b06f" />
  </g>
  <!-- wordmark: DEAD in light, HAND in red (dead) -->
  <text x="42" y="32" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="800" letter-spacing="0.04em">
    <tspan fill="#e7e9ec">DEAD</tspan><tspan fill="#e5484d">HAND</tspan>
  </text>
</svg>
